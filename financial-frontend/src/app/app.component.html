@if (showShell()) {
  <div class="h-screen overflow-hidden bg-app-bg text-app-ink">
    <div class="relative flex h-full">
      <div class="hidden h-full lg:block">
        <app-sidebar></app-sidebar>
      </div>

      @if (isMobileSidebarOpen()) {
        <button
          type="button"
          class="fixed inset-0 z-30 bg-app-ink/40 lg:hidden"
          [attr.aria-label]="'common.actions.closeMenu' | translate"
          (click)="closeMobileSidebar()"
        ></button>
      }

      <div
        class="fixed inset-y-0 left-0 z-40 w-[250px] -translate-x-full transition-transform duration-200 ease-out lg:hidden"
        [class.translate-x-0]="isMobileSidebarOpen()"
      >
        <app-sidebar [showMobileClose]="true" (closeRequested)="closeMobileSidebar()"></app-sidebar>
      </div>

      <main class="h-full min-w-0 flex-1 overflow-y-auto overflow-x-hidden">
        <div class="sticky top-0 z-20 border-b border-app-border bg-app-surface/95 px-4 py-3 backdrop-blur-sm lg:hidden">
          <div class="flex items-center justify-between gap-3">
            <button
              type="button"
              class="app-icon-btn h-9 w-9"
              [attr.aria-label]="'common.actions.openMenu' | translate"
              (click)="toggleMobileSidebar()"
            >
              <span class="material-symbols-rounded text-[20px]" aria-hidden="true">menu</span>
            </button>

            <p class="truncate text-sm font-bold text-app-ink">{{ 'app.title' | translate }}</p>

            <div class="h-9 w-9"></div>
          </div>
        </div>

        @if (isLoading()) {
          <app-loading-skeleton [route]="skeletonRoute()" [contentOnly]="true"></app-loading-skeleton>
        } @else {
          <router-outlet></router-outlet>
        }
      </main>
    </div>
  </div>
} @else {
  @if (isLoading()) {
    <main class="flex min-h-screen items-center justify-center bg-app-bg px-4 text-app-ink">
      <app-loader [size]="36" [stroke]="4" labelKey="common.loading"></app-loader>
    </main>
  } @else {
    <main class="min-h-screen bg-app-bg text-app-ink">
      <router-outlet></router-outlet>
    </main>
  }
}
