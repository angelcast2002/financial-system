<div class="space-y-5">
  <div class="flex items-start gap-3">
    <div class="flex min-w-0 flex-1 gap-3 overflow-x-auto pb-1">
      @for (contact of contacts; track contact.name) {
        <article class="flex min-w-[108px] shrink-0 flex-col items-center gap-2">
          <img
            [src]="contact.avatarUrl"
            [alt]="contact.name"
            class="h-14 w-14 rounded-full object-cover shadow-app-soft"
            loading="lazy"
            decoding="async"
          />
          <p class="w-full truncate text-center text-sm font-semibold text-app-ink">{{ contact.name }}</p>
          <p class="w-full truncate text-center text-xs font-semibold text-app-muted">{{ contact.relation }}</p>
        </article>
      }
    </div>

    <button type="button" class="app-icon-btn h-10 w-10 shrink-0 self-center">
      <app-icon name="chevron-right" [size]="16"></app-icon>
    </button>
  </div>

  <div class="grid gap-3 sm:grid-cols-[minmax(0,1fr)_auto_auto] sm:items-center">
    <label class="text-sm font-semibold text-app-muted">{{ 'transfer.amount' | translate }}</label>
    <input class="app-input w-full text-center sm:max-w-28" type="text" [value]="amount" aria-label="Amount" />
    <button
      type="button"
      class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-app-primary px-5 py-3 text-sm font-semibold text-white transition hover:opacity-90 sm:w-auto"
    >
      {{ 'transfer.send' | translate }}
      <app-icon name="send" [size]="14"></app-icon>
    </button>
  </div>
</div>
