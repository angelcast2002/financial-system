<article class="app-card-soft flex items-center gap-3 p-4 sm:gap-4 sm:p-5">
  <div class="flex h-12 w-12 items-center justify-center rounded-full" [ngClass]="toneClass">
    <app-icon [name]="icon" [size]="20"></app-icon>
  </div>

  <div>
    <p class="text-sm font-semibold text-app-muted">{{ labelKey | translate }}</p>
    <p class="text-2xl font-bold leading-tight text-app-ink sm:text-3xl">{{ value }}</p>
  </div>
</article>
