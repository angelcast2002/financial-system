<article class="h-full min-h-52 overflow-hidden p-4 sm:p-5" [class]="containerClass">
  <div class="flex items-start justify-between">
    <div class="min-w-0">
      <p class="text-xs font-semibold" [class]="labelClass">{{ 'cards.balance' | translate }}</p>
      <p class="truncate text-2xl font-bold leading-tight sm:text-3xl">{{ balance }}</p>
    </div>

    <div class="rounded-xl p-2" [ngClass]="variant === 'primary' ? 'bg-white/20 text-white' : 'bg-app-primary/10 text-app-primary'">
      <app-icon name="card" [size]="20"></app-icon>
    </div>
  </div>

  <div class="mt-6 grid grid-cols-2 gap-4">
    <div class="min-w-0">
      <p class="text-xs font-semibold" [class]="labelClass">{{ 'cards.holder' | translate }}</p>
      <p class="truncate text-sm font-semibold">{{ holder }}</p>
    </div>
    <div class="min-w-0">
      <p class="text-xs font-semibold" [class]="labelClass">{{ 'cards.expiry' | translate }}</p>
      <p class="truncate text-sm font-semibold">{{ expiry }}</p>
    </div>
  </div>

  <div class="mt-6 border-t pt-4" [ngClass]="variant === 'primary' ? 'border-white/20' : 'border-app-border'">
    <div class="flex items-center justify-between gap-3">
      <p class="min-w-0 flex-1 truncate text-base font-bold tracking-[0.08em] sm:text-2xl sm:tracking-wide">{{ number }}</p>
      <div class="flex shrink-0 items-center gap-1 opacity-80">
        <span class="h-5 w-5 rounded-full" [ngClass]="variant === 'primary' ? 'bg-white/50' : 'bg-app-muted/40'"></span>
        <span class="h-5 w-5 rounded-full -ml-2" [ngClass]="variant === 'primary' ? 'bg-white/30' : 'bg-app-muted/20'"></span>
      </div>
    </div>
  </div>
</article>
